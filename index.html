<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIKSI Kerinci - Live Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-sheetrock/1.1.4/dist/sheetrock.min.js"></script>
</head>
<body class="bg-slate-50">

    <nav class="bg-blue-800 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <span class="font-bold text-xl">DIKSI LIVE DATA</span>
            <a href="#" class="text-sm border border-white px-3 py-1 rounded">Update Terakhir: 2026</a>
        </div>
    </nav>

    <section class="container mx-auto py-12 px-4">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
            <div class="bg-blue-600 p-6">
                <h2 class="text-white text-xl font-semibold"><i class="fas fa-table mr-2"></i> Tabel Indikator Strategis (Real-time)</h2>
                <p class="text-blue-100 text-sm">Data di bawah ini ditarik langsung dari Google Sheets BPS Kabupaten Kerinci.</p>
            </div>
            
            <div class="p-6 overflow-x-auto">
                <table id="tabel-diksi" class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-blue-900 uppercase text-sm leading-normal">
                            </tr>
                    </thead>
                    <tbody class="text-gray-600 text-sm font-light">
                        </tbody>
                </table>
                
                <div id="loading" class="text-center py-10">
                    <i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i>
                    <p class="mt-2 text-gray-400">Menghubungkan ke database...</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        // GANTI LINK DI BAWAH INI DENGAN LINK GOOGLE SHEETS ANDA YANG SUDAH DI-PUBLISH
        var mySpreadsheet = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR5ah3Zq0erh5Er-JQnD_L0ajjoLqQJevyc2bm54CsOPtrKLqbWtCs3qaqXUbe7KvLsiH-f-dH01Sbk/pubhtml';

        $('#tabel-diksi').sheetrock({
            url: mySpreadsheet,
            query: "select A,B,C,D", // Sesuaikan kolom yang ingin ditampilkan (A, B, C, dst)
            fetchSize: 10,
            callback: function (error, options, response) {
                // Sembunyikan loading jika data sudah muncul
                $('#loading').hide();
                if (error) {
                    console.log("Error:", error);
                    $('#loading').show().html("<p class='text-red-500'>Gagal memuat data. Pastikan link Google Sheets sudah di-publish ke web.</p>");
                }
            }
        });
    </script>

    <style>
        /* Styling khusus agar tabel terlihat profesional */
        #tabel-diksi td, #tabel-diksi th { padding: 12px 15px; border-bottom: 1px solid #eee; }
        #tabel-diksi tr:hover { background-color: #f9fafb; }
    </style>

</body>
</html>

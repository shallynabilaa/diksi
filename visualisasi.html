<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualisasi Data - DIKSI Kerinci</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/28/Lambang_Badan_Pusat_Statistik_%28BPS%29.svg" alt="Logo BPS" class="w-8">
                <span class="font-bold text-lg tracking-tighter uppercase">Diksi Kerinci</span>
            </div>
            <div class="flex space-x-6 text-sm font-medium">
                <a href="index.html" class="hover:text-blue-300 transition">Beranda</a>
                <a href="data.html" class="hover:text-blue-300 transition">Data</a>
                <a href="visualisasi.html" class="text-blue-300 font-bold border-b-2 border-blue-300">Visualisasi</a>
            </div>
        </div>
    </nav>

    <header class="bg-white border-b border-slate-200 py-12 px-4">
        <div class="container mx-auto text-center">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Visualisasi Interaktif</h1>
            <p class="text-slate-500">Representasi grafis indikator strategis Kabupaten Kerinci</p>
        </div>
    </header>

    <main class="container mx-auto py-12 px-4">
        <div class="grid md:grid-cols-2 gap-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-700 mb-4 flex items-center">
                    <i class="fas fa-chart-line mr-2 text-blue-500"></i> Tren IPM Kabupaten Kerinci
                </h3>
                <canvas id="chartIPM"></canvas>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-700 mb-4 flex items-center">
                    <i class="fas fa-chart-bar mr-2 text-red-500"></i> Persentase Kemiskinan (%)
                </h3>
                <canvas id="chartMiskin"></canvas>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 md:col-span-2">
                <h3 class="font-bold text-slate-700 mb-4 flex items-center">
                    <i class="fas fa-chart-area mr-2 text-emerald-500"></i> Pertumbuhan Ekonomi ADHK
                </h3>
                <canvas id="chartEkonomi" style="max-height: 300px;"></canvas>
            </div>

        </div>
    </main>

    <script>
        // Data IPM
        new Chart(document.getElementById('chartIPM'), {
            type: 'line',
            data: {
                labels: ['2020', '2021', '2022', '2023', '2024'],
                datasets: [{
                    label: 'Poin IPM',
                    data: [70.5, 71.2, 71.8, 72.0, 72.15],
                    borderColor: '#3b82f6',
                    backgroundColor: '#3b82f633',
                    fill: true,
                    tension: 0.4
                }]
            }
        });

        // Data Kemiskinan
        new Chart(document.getElementById('chartMiskin'), {
            type: 'bar',
            data: {
                labels: ['2020', '2021', '2022', '2023', '2024'],
                datasets: [{
                    label: 'Persentase (%)',
                    data: [15.1, 14.8, 14.35, 14.15, 14.12],
                    backgroundColor: '#ef4444'
                }]
            }
        });

        // Data Ekonomi
        new Chart(document.getElementById('chartEkonomi'), {
            type: 'line',
            data: {
                labels: ['2020', '2021', '2022', '2023', '2024'],
                datasets: [{
                    label: 'Laju Pertumbuhan (%)',
                    data: [2.1, 3.15, 4.20, 4.45, 4.52],
                    borderColor: '#10b981',
                    borderWidth: 3,
                    pointBackgroundColor: '#fff',
                    pointRadius: 5
                }]
            }
        });
    </script>

    <footer class="bg-slate-900 text-slate-500 py-10 px-4 text-center text-xs mt-20">
        <p>© 2026 BPS Kabupaten Kerinci - Dashbord DIKSI</p>
    </footer>

</body>
</html>
